spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración JPA/Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# spring.sql.init.mode=always
# spring.sql.init.schema-locations=classpath:schema.sql

# Otros ajustes
spring.jpa.properties.hibernate.format_sql=true

# JWT
application.security.jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

logging.level.root=ERROR

# a year
application.security.jwt.expiration=31536000000

spring.main.allow-bean-definition-overriding=true

# cors
app.allowed.origins=${CORS_ALLOW:http://localhost:5175}

# main printer name
app.printer.name=POS-58

# File upload
file.upload-dir=uploads

# File upload configuration
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
